spring.application.name=verbatim

# Embedded H2 file database (zero-setup, persists between runs)
spring.datasource.url=jdbc:h2:file:./data/gre;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true

# Daily review cap (words per session)
verbatim.daily-limit=15
